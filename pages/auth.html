<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PlanUp — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#6366f1;--accent-light:#eef2ff;--accent-dim:rgba(99,102,241,.12);
  --bg:#111827;--bg2:#1f2937;--bg3:#374151;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#f9fafb;--text2:#9ca3af;--text3:#6b7280;
  --sh:0 24px 60px rgba(0,0,0,.5);
}
[data-theme="light"]{
  --bg:#f1f5f9;--bg2:#ffffff;--bg3:#f3f4f6;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.13);
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --sh:0 4px 24px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);color:var(--text);font-size:14px;
  -webkit-font-smoothing:antialiased;
  transition:background .35s,color .35s;
  padding:20px 16px;position:relative;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.08),transparent 60%);
  pointer-events:none;z-index:0;
}

/* ── Theme toggle ── */
.theme-toggle{
  position:fixed;top:16px;right:16px;z-index:100;
  width:36px;height:36px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .2s,transform .25s;
  color:var(--text2);
}
.theme-toggle:hover{background:var(--bg3);transform:rotate(20deg)}
/* SVG inside inherits stroke from color */
.theme-toggle svg{stroke:var(--text2);display:block;transition:stroke .35s}

/* ── Card ── */
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  box-shadow:var(--sh);padding:32px;width:100%;max-width:400px;
  position:relative;z-index:1;
}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:28px}
.logo-mark{
  width:32px;height:32px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:15px;flex-shrink:0;
  box-shadow:0 0 16px rgba(99,102,241,.3);
}
.logo-name{font-size:18px;font-weight:700;letter-spacing:-.3px}
.tabs{
  display:flex;background:var(--bg3);border-radius:10px;
  padding:4px;gap:4px;margin-bottom:24px;
}
.tab{
  flex:1;height:34px;border:none;border-radius:7px;
  font-family:inherit;font-size:13px;font-weight:500;
  color:var(--text2);background:transparent;cursor:pointer;transition:all .15s;
}
.tab.on{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:12px;font-weight:500;color:var(--text2)}
input[type=text],input[type=email],input[type=password]{
  height:40px;padding:0 12px;
  background:var(--bg);border:1px solid var(--border2);border-radius:8px;
  font-family:inherit;font-size:13px;color:var(--text);
  outline:none;width:100%;transition:border-color .15s,box-shadow .15s;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
input::placeholder{color:var(--text3)}

/* ── Password toggle ── */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.eye-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:4px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);transition:color .15s;
  border-radius:4px;
}
.eye-btn:hover{color:var(--text2)}
.eye-btn svg{stroke:currentColor;display:block}

.forgot{
  font-size:12px;color:var(--accent);cursor:pointer;
  text-align:right;margin-top:-8px;margin-bottom:12px;
  display:block;width:fit-content;margin-left:auto;
}
.forgot:hover{text-decoration:underline}
.msg{padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.5;display:none;margin-bottom:12px}
.msg.on{display:block}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}
.msg.ok {background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:#34d399}
[data-theme=light] .msg.err{background:#fef2f2;border-color:#fecaca;color:#dc2626}
[data-theme=light] .msg.ok {background:#f0fdf4;border-color:#bbf7d0;color:#16a34a}
.submit{
  width:100%;height:42px;background:var(--accent);color:#fff;
  border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;
  cursor:pointer;margin-top:2px;
  box-shadow:0 0 20px rgba(99,102,241,.25);
  transition:filter .15s,box-shadow .15s,transform .1s;
}
.submit:hover{filter:brightness(1.1);box-shadow:0 0 32px rgba(99,102,241,.4);transform:translateY(-1px)}
.submit:active{transform:translateY(0)}
.submit:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.google-btn{
  width:100%;height:42px;background:var(--bg);
  border:1px solid var(--border2);border-radius:8px;
  display:flex;align-items:center;justify-content:center;gap:9px;
  font-family:inherit;font-size:13px;font-weight:500;color:var(--text);
  cursor:pointer;transition:background .15s,border-color .15s;
}
.google-btn:hover{background:var(--bg3);border-color:var(--accent)}
.back-link{
  display:flex;align-items:center;justify-content:center;gap:5px;
  margin-top:20px;font-size:12px;color:var(--text3);text-decoration:none;
  transition:color .15s;
}
.back-link:hover{color:var(--accent)}
.back-link svg{stroke:currentColor}
@media(max-width:480px){
  body{align-items:flex-start;padding-top:52px;padding-bottom:40px}
  .card{padding:24px 20px}
}
@media(max-width:360px){
  .card{padding:20px 16px}
}
</style>
</head>
<body>

<!-- Theme toggle — inline SVG, zero dependencies -->
<button class="theme-toggle" id="theme-btn" title="Toggle theme">
  <svg id="theme-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- moon path injected by JS -->
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<div class="card">
  <div class="logo">
    <div class="logo-mark">P</div>
    <span class="logo-name">PlanUp</span>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-in" onclick="switchTab('in')">Sign in</button>
    <button class="tab"    id="tab-up" onclick="switchTab('up')">Create account</button>
  </div>

  <div class="msg err" id="err-box"></div>
  <div class="msg ok"  id="ok-box"></div>

  <div class="fg" id="name-fg" style="display:none">
    <label>Full name</label>
    <input id="f-name" type="text" placeholder="Your name" autocomplete="name"/>
  </div>
  <div class="fg">
    <label>Email address</label>
    <input id="f-email" type="email" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <div class="fg">
    <label>Password</label>
    <div class="pw-wrap">
      <input id="f-pass" type="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doSubmit()"/>
      <!-- Eye toggle — inline SVG -->
      <button class="eye-btn" id="eye-btn" onclick="toggleEye()" type="button" title="Show/hide password">
        <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>
  <span class="forgot" id="forgot-link" onclick="forgotPw()">Forgot password?</span>

  <button class="submit" id="submit-btn" onclick="doSubmit()">Sign in</button>

  <div class="divider">or</div>

  <button class="google-btn" onclick="doGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <a href="../index.html" class="back-link">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to PlanUp
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://ilsbnkwcqxiijiyrljfi.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsc2Jua3djcXhpaWppeXJsamZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDQzMTcsImV4cCI6MjA4Nzk4MDMxN30.trrsgMaSG7hgq-rpzcUJyqffR8AjOvyfdaSEoeRj_a4',
  { auth:{ storage:window.localStorage,storageKey:'planup-auth',autoRefreshToken:true,persistSession:true,detectSessionInUrl:true } }
);

/* ── INLINE SVG PATHS — no external lib needed ── */
const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const SUN  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
const EYE_OPEN   = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
const EYE_CLOSED = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';

/* ── THEME ── */
let theme = localStorage.getItem('pu-theme') || 'dark';

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('pu-theme', t);
  // Swap SVG path — works in both themes, no flash, no lib needed
  document.getElementById('theme-icon').innerHTML = t === 'dark' ? SUN : MOON;
}

applyTheme(theme);

document.getElementById('theme-btn').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme(theme);
});

/* ── PASSWORD EYE TOGGLE ── */
let eyeOpen = false;
function toggleEye() {
  eyeOpen = !eyeOpen;
  const inp = document.getElementById('f-pass');
  inp.type = eyeOpen ? 'text' : 'password';
  document.getElementById('eye-icon').innerHTML = eyeOpen ? EYE_CLOSED : EYE_OPEN;
}

/* ── PRE-FILL EMAIL FROM LANDING ── */
const urlEmail = new URLSearchParams(location.search).get('email');
if (urlEmail) {
  document.getElementById('f-email').value = urlEmail;
  setTimeout(() => document.getElementById('f-pass').focus(), 100);
}

/* ── AUTH CHECK ── */
sb.auth.getSession().then(({ data:{ session } }) => { if (session) goApp(); });

/* ── FORM LOGIC ── */
let mode = 'in';

function switchTab(m) {
  mode = m;
  document.getElementById('tab-in').classList.toggle('on', m==='in');
  document.getElementById('tab-up').classList.toggle('on', m==='up');
  document.getElementById('name-fg').style.display = m==='up' ? '' : 'none';
  document.getElementById('forgot-link').style.display = m==='in' ? '' : 'none';
  document.getElementById('submit-btn').textContent = m==='in' ? 'Sign in' : 'Create account';
  document.getElementById('f-pass').autocomplete = m==='in' ? 'current-password' : 'new-password';
  hideErr(); hideOk();
}

async function doSubmit() {
  hideErr(); hideOk();
  const email = document.getElementById('f-email').value.trim();
  const pass  = document.getElementById('f-pass').value;
  const name  = document.getElementById('f-name').value.trim();
  if (!email) return showErr('Enter your email');
  if (!pass)  return showErr('Enter your password');
  if (pass.length < 6) return showErr('Password must be at least 6 characters');
  if (mode==='up' && !name) return showErr('Enter your full name');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = mode==='in' ? 'Signing in…' : 'Creating account…';
  if (mode==='up') {
    const { error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ full_name:name } } });
    btn.disabled=false; btn.textContent='Create account';
    if (error) return showErr(error.message);
    showOk('Account created! Check your email to confirm, then sign in.');
    switchTab('in');
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password:pass });
    btn.disabled=false; btn.textContent='Sign in';
    if (error) return showErr(error.message);
    goApp();
  }
}

async function doGoogle() {
  const { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: location.origin+'/pages/app.html' } });
  if (error) showErr(error.message);
}

async function forgotPw() {
  const email = document.getElementById('f-email').value.trim();
  if (!email) { showErr('Enter your email first'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin+'/pages/auth.html' });
  if (error) showErr(error.message);
  else showOk('Password reset email sent! Check your inbox.');
}

function goApp()    { location.href = '../pages/app.html'; }
function showErr(m) { const e=document.getElementById('err-box'); e.textContent=m; e.classList.add('on'); }
function hideErr()  { document.getElementById('err-box').classList.remove('on'); }
function showOk(m)  { const e=document.getElementById('ok-box');  e.textContent=m; e.classList.add('on'); }
function hideOk()   { document.getElementById('ok-box').classList.remove('on'); }
</script>
</body>
</html>
