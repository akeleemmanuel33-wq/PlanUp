async function qcKey(e) {
  if (e.key === 'Escape') { closeQuickCapture(); return; }
  if (e.key !== 'Enter') return;
  const title = q('qc-input').value.trim();
  if (!title) return;

  q('qc-input').value = '';
  closeQuickCapture();

  if (!USER) return;
  const { data, error } = await sb.from('tasks')
    .insert({ user_id: USER.id, title, status:'todo', priority:'medium' })
    .select('id').single();

  if (error) { showToast('Quick capture failed','err'); return; }
  tasks = await loadTasks();
  renderTasks(); updateCounts(); renderSidebar();
  showToast('"' + title + '" captured');
}

// ══════════════════════════════════════════════
// GLOBAL KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName.toLowerCase();
  const typing = tag === 'input' || tag === 'textarea' || tag === 'select';

  // Cmd/Ctrl + K → command palette
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    if (q('cmd-overlay').classList.contains('on')) closeCmd();
    else openCmd();
    return;
  }

  // Escape closes everything
  if (e.key === 'Escape') {
    closeModal(); closeCmd(); closeQuickCapture();
    return;
  }

  if (typing) return; // don't fire shortcuts while typing

  // C → new task
  if (e.key === 'c' || e.key === 'C') openModal(null);

  // Q → quick capture
  if (e.key === 'q' || e.key === 'Q') openQuickCapture();

  // F → focus mode
  if (e.key === 'f' || e.key === 'F') toggleFocus();

  // ? → open command palette
  if (e.key === '?') openCmd();

  // 1-5 → navigate views
  if (e.key === '1') nav('all');
  if (e.key === '2') nav('today');
  if (e.key === '3') nav('upcoming');
  if (e.key === '4') nav('overdue');
  if (e.key === '5') nav('analytics');
});

// ── Patch renderTasks to apply custom sort ────────────────────
// Sort mode logic below:
function applySortMode(list) {
  const pinned_list  = list.filter(t => t.pinned);
  const unpinned = list.filter(t => !t.pinned);

  function sortFn(a, b) {
    const priOrder = { high:0, medium:1, low:2 };
    if (sortMode === 'priority') return (priOrder[a.priority]||1) - (priOrder[b.priority]||1);
    if (sortMode === 'due') {
      if (!a.due_date && !b.due_date) return 0;
      if (!a.due_date) return 1;
      if (!b.due_date) return -1;
      return new Date(a.due_date) - new Date(b.due_date);
    }
    if (sortMode === 'alpha') return (a.title||'').localeCompare(b.title||'');
    if (sortMode === 'created') return new Date(b.created_at||0) - new Date(a.created_at||0);
    return 0;
  }

  return [...pinned_list.sort(sortFn), ...unpinned.sort(sortFn)];
}

function openTagManager() {

function renderTagManagerList() {
  const container = q('tag-list-modal');
  if (!tags.length) {
    container.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px">No tags yet — create your first one above</div>`;
    return;
  }
  container.innerHTML = tags.map(tag => {
    const taskCount = tasks.filter(t => (t.task_tags||[]).some(tt=>tt.tag?.id===tag.id)).length;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);transition:border-color .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">

      <input class="inp" value="${x(tag.name)}" id="tag-nm-${tag.id}"
        style="flex:1;height:28px;font-size:13px;font-weight:500;border:none;background:transparent;padding:0;outline:none"
        onblur="updateTagName('${tag.id}', this.value)"
        onkeydown="if(event.key==='Enter')this.blur()"/>
      <input type="color" value="${tag.color}" id="tag-cl-${tag.id}"
        style="width:28px;height:28px;padding:1px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:var(--bg)"
        onchange="updateTagColor('${tag.id}', this.value)"/>
      <span style="font-size:11px;color:var(--text3);white-space:nowrap">${taskCount} task${taskCount!==1?'s':''}</span>
      <button class="icon-btn" onclick="deleteTag('${tag.id}')" style="flex-shrink:0;color:var(--text3)" title="Delete tag"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
    </div>`;
  }).join('');
}

async function createTag() {
  const name  = q('new-tag-name').value.trim();
  const color = q('new-tag-color').value;
  if (!name) { q('new-tag-name').style.borderColor='var(--red)'; q('new-tag-name').focus(); return; }
  q('new-tag-name').style.borderColor='';

  const { data, error } = await sb.from('tags')
    .insert({ user_id: USER.id, name, color })
    .select().single();

  if (error) { showToast('Failed: ' + error.message, 'err'); return; }

  tags.push(data);
  q('new-tag-name').value = '';
  renderTagManagerList();
  renderSidebar();
  showToast('Tag "' + name + '" created');
}

async function updateTagName(id, name) {
  name = name.trim();
  if (!name) return;
  const { error } = await sb.from('tags').update({ name }).eq('id', id).eq('user_id', USER.id);
  if (error) { showToast('Update failed', 'err'); return; }
  tags = tags.map(t => t.id===id ? {...t, name} : t);
  renderSidebar();
}

async function updateTagColor(id, color) {
  const { error } = await sb.from('tags').update({ color }).eq('id', id).eq('user_id', USER.id);
  if (error) { showToast('Update failed', 'err'); return; }
  tags = tags.map(t => t.id===id ? {...t, color} : t);
  tasks = await loadTasks(); // reload to update tag colors on cards
  renderTasks(); renderSidebar();
}

async function deleteTag(id) {
  const tag = tags.find(t=>t.id===id);
  if (!confirm(`Delete tag "${tag?.name}"? It will be removed from all tasks.`)) return;
  const { error } = await sb.from('tags').delete().eq('id', id).eq('user_id', USER.id);
  if (error) { showToast('Delete failed', 'err'); return; }
  tags = tags.filter(t => t.id !== id);
  tasks = await loadTasks();
  renderTagManagerList();
  renderSidebar();
  renderTasks();
  showToast('Tag deleted');
}

// ══════════════════════════════════════════════
// SUBTASK INLINE TOGGLE (on task card)
// ══════════════════════════════════════════════
async function toggleSubtask(taskId, subtaskId, current) {
  const done = !current;
  // Optimistic update
  tasks = tasks.map(t => {
    if (t.id !== taskId) return t;
    return { ...t, subtasks: (t.subtasks||[]).map(s => s.id===subtaskId ? {...s, completed:done} : s) };
  });
  renderTasks();
  await sb.from('subtasks').update({ completed: done }).eq('id', subtaskId);
}
